name: Build & Release EXE

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build EXE with iexpress
        shell: pwsh
        run: build/create-setup-exe.ps1

      - name: Embed UAC elevation manifest
        shell: pwsh
        run: |
          $exePath = "$env:GITHUB_WORKSPACE\cloudbox-setup.exe"

          # Search Windows SDK first, then Visual Studio for mt.exe
          $mt = Get-ChildItem 'C:\Program Files (x86)\Windows Kits\10\bin' `
                  -Recurse -Filter mt.exe -ErrorAction SilentlyContinue |
                Where-Object FullName -match 'x64' |
                Select-Object -First 1 -ExpandProperty FullName

          if (-not $mt) {
            $mt = Get-ChildItem 'C:\Program Files\Microsoft Visual Studio' `
                    -Recurse -Filter mt.exe -ErrorAction SilentlyContinue |
                  Where-Object FullName -match 'x64' |
                  Select-Object -First 1 -ExpandProperty FullName
          }

          if ($mt) {
            Write-Host "Using mt.exe: $mt"
            & $mt -manifest "$env:GITHUB_WORKSPACE\build\app.manifest" `
                  -outputresource:"${exePath};#1"
            if ($LASTEXITCODE -ne 0) { throw "mt.exe failed with exit code $LASTEXITCODE" }
            Write-Host "UAC elevation manifest embedded."
          } else {
            Write-Warning "mt.exe not found — skipping manifest embedding."
          }

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/')
        with:
          name: CloudBox ${{ github.ref_name }}
          files: cloudbox-setup.exe
          generate_release_notes: true
          fail_on_unmatched_files: true
